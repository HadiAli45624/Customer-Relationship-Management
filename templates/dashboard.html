<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Mail – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0f11; --surface: #16181c; --surface2: #1e2126; --surface3: #252830;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --accent: #4f8ef7; --accent2: #7c5cfc; --text: #e8eaf0; --muted: #7a7f8e;
  --success: #3dd68c; --warning: #f5a623; --danger: #f76f6f;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
       min-height: 100vh; display: flex; flex-direction: column; }

/* NAV */
nav { display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0;
      background: rgba(14,15,17,0.9); backdrop-filter: blur(12px); z-index: 100; }
.nav-logo { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.05em; }
.nav-logo span { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.nav-user { font-size: 0.82rem; color: var(--muted); }
.btn-sm { padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.82rem; font-weight: 500;
           cursor: pointer; border: 1px solid var(--border2); background: var(--surface2);
           color: var(--text); text-decoration: none; transition: all 0.2s; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

/* LAYOUT */
.layout { display: flex; flex: 1; min-height: 0; }
.sidebar { width: 320px; border-right: 1px solid var(--border);
            overflow-y: auto; padding: 1.5rem; flex-shrink: 0; }
.main { flex: 1; overflow-y: auto; padding: 2rem; }

/* LEAD QUEUE */
.sidebar-title { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em;
                  color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; }
.lead-card { background: var(--surface); border: 1px solid var(--border);
              border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem;
              cursor: pointer; transition: all 0.2s; position: relative; }
.lead-card:hover, .lead-card.active { border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent) inset; }
.lead-card-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 0.2rem; }
.lead-card-email { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.5rem; font-family: 'DM Mono'; }
.lead-card-meta { display: flex; align-items: center; gap: 0.5rem; }
.score-badge { font-size: 0.72rem; font-weight: 600; padding: 0.15rem 0.5rem;
                border-radius: 20px; background: var(--surface3); color: var(--muted); }
.score-badge.high { background: rgba(61,214,140,0.15); color: var(--success); }
.score-badge.mid  { background: rgba(245,166,35,0.15); color: var(--warning); }
.score-badge.low  { background: rgba(247,111,111,0.15); color: var(--danger); }
.mode-badge { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 20px;
               background: var(--surface3); color: var(--muted); }
.delete-lead { position: absolute; top: 0.75rem; right: 0.75rem;
                background: none; border: none; color: var(--muted);
                cursor: pointer; font-size: 1rem; padding: 0.1rem 0.3rem;
                border-radius: 4px; transition: all 0.2s; }
.delete-lead:hover { background: var(--danger); color: #fff; }

.btn-add { width: 100%; padding: 0.7rem; background: var(--surface2);
            border: 1px dashed var(--border2); border-radius: 10px;
            color: var(--muted); font-size: 0.85rem; cursor: pointer;
            font-family: 'DM Sans'; transition: all 0.2s; margin-top: 0.5rem; }
.btn-add:hover { border-color: var(--accent); color: var(--accent); }

.btn-sheet { width: 100%; padding: 0.8rem; background: linear-gradient(135deg,var(--accent),var(--accent2));
              border: none; border-radius: 10px; color: #fff; font-size: 0.9rem;
              font-weight: 600; cursor: pointer; font-family: 'DM Sans';
              transition: opacity 0.2s; margin-top: 1rem; }
.btn-sheet:hover { opacity: 0.85; }
.btn-sheet:disabled { opacity: 0.4; cursor: not-allowed; }

/* FORM SECTION */
.form-section { background: var(--surface); border: 1px solid var(--border);
                 border-radius: 14px; padding: 1.75rem; margin-bottom: 1.5rem; }
.form-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; }
.form-row { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: flex-end; }
.form-group { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
label { font-size: 0.8rem; color: var(--muted); font-weight: 500; }
input[type=text], input[type=email], input[type=date], textarea {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); padding: 0.65rem 0.9rem;
  font-family: 'DM Sans'; font-size: 0.88rem; transition: border-color 0.2s;
  width: 100%; }
input:focus, textarea:focus { outline: none; border-color: var(--accent); }
textarea { resize: vertical; min-height: 100px; font-family: 'DM Mono'; font-size: 0.82rem; }

.mode-toggle { display: flex; gap: 0.5rem; }
.mode-btn { flex: 1; padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border2);
             background: var(--surface2); color: var(--muted); font-size: 0.85rem;
             cursor: pointer; font-family: 'DM Sans'; transition: all 0.2s; }
.mode-btn.active { border-color: var(--accent); background: rgba(79,142,247,0.1); color: var(--accent); }

.limit-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.limit-btn { padding: 0.45rem 0.9rem; border-radius: 8px; border: 1px solid var(--border2);
              background: var(--surface2); color: var(--muted); font-size: 0.85rem;
              cursor: pointer; font-family: 'DM Sans'; transition: all 0.2s; font-weight: 500; }
.limit-btn.active { border-color: var(--accent2); background: rgba(124,92,252,0.1); color: var(--accent2); }

.btn-primary { padding: 0.7rem 1.6rem; background: var(--accent); border: none;
                border-radius: 8px; color: #fff; font-size: 0.9rem; font-weight: 600;
                cursor: pointer; font-family: 'DM Sans'; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* RESULTS */
.results-section { display: none; }
.results-section.show { display: block; }

.ai-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.ai-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
.ai-card-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
                  letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.4rem; }
.ai-card-value { font-size: 0.9rem; line-height: 1.5; }
.score-ring { font-size: 1.8rem; font-weight: 700; }
.score-ring.high { color: var(--success); }
.score-ring.mid  { color: var(--warning); }
.score-ring.low  { color: var(--danger); }

.emails-list { margin-bottom: 1.5rem; }
.email-item { background: var(--surface2); border: 1px solid var(--border);
               border-radius: 8px; padding: 0.9rem 1rem; margin-bottom: 0.5rem; }
.email-subj { font-weight: 500; font-size: 0.88rem; margin-bottom: 0.3rem; }
.email-meta { font-size: 0.78rem; color: var(--muted); font-family: 'DM Mono'; }

.draft-area { position: relative; }
.draft-actions { display: flex; gap: 0.75rem; margin-top: 0.75rem; flex-wrap: wrap; }
.btn-outline { padding: 0.6rem 1.2rem; border: 1px solid var(--border2); border-radius: 8px;
                background: transparent; color: var(--text); font-size: 0.85rem;
                cursor: pointer; font-family: 'DM Sans'; transition: all 0.2s; }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-success { background: rgba(61,214,140,0.15); border-color: var(--success); color: var(--success); }

.reminder-row { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
.contact-found { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem;
                  color: var(--success); background: rgba(61,214,140,0.1);
                  border: 1px solid rgba(61,214,140,0.25); border-radius: 6px;
                  padding: 0.35rem 0.75rem; }

/* STATE */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface);
          border: 1px solid var(--border2); border-radius: 10px; padding: 0.85rem 1.25rem;
          font-size: 0.88rem; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; pointer-events: auto; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }
.empty-state { text-align: center; padding: 3rem 2rem; color: var(--muted); }
.empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
.sheet-link-row { margin-top: 1rem; }
.sheet-link-row a { color: var(--success); font-size: 0.88rem; }
.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">CRM <span>Mail</span></div>
  <div class="nav-right">
    <span class="nav-user">{{ user_name }} &middot; {{ user_email }}</span>
    <a href="/logout" class="btn-sm">Sign out</a>
  </div>
</nav>

<div class="layout">
  <!-- SIDEBAR: Lead Queue -->
  <aside class="sidebar">
    <div class="sidebar-title">Lead queue (<span id="lead-count">0</span>)</div>
    <div id="lead-list"></div>
    <button class="btn-add" onclick="showAddForm()">+ Analyze new contact</button>
    <button class="btn-sheet" id="btn-create-sheet" disabled onclick="createSheet()">
      📊 Create Google Sheet
    </button>
    <div id="sheet-link-row" class="sheet-link-row" style="display:none"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- EMPTY STATE -->
    <div id="empty-state" class="empty-state">
      <div class="icon">📬</div>
      <p>No contacts analyzed yet.<br>Click <strong>+ Analyze new contact</strong> to get started.</p>
    </div>

    <!-- ANALYSIS FORM -->
    <div id="analysis-form" style="display:none">
      <div class="form-section">
        <h2>Analyze a contact</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Contact email</label>
            <input type="email" id="input-email" placeholder="name@company.com"
                   oninput="debounceLookup()">
          </div>
          <div id="contact-name-badge" style="display:none;padding-bottom:0.5rem"></div>
        </div>
        <div id="contact-name-display" style="margin-bottom:1rem;display:none"></div>

        <div class="form-group" style="margin-bottom:1rem">
          <label>Direction</label>
          <div class="mode-toggle">
            <button class="mode-btn active" id="mode-inbound" onclick="setMode('inbound')">📥 Inbound (from them)</button>
            <button class="mode-btn" id="mode-outbound" onclick="setMode('outbound')">📤 Outbound (sent by me)</button>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:1.25rem">
          <label>Number of emails to fetch</label>
          <div class="limit-btns">
            <button class="limit-btn" onclick="setLimit(1,this)">1</button>
            <button class="limit-btn active" onclick="setLimit(5,this)">5</button>
            <button class="limit-btn" onclick="setLimit(2,this)">2</button>
            <button class="limit-btn" onclick="setLimit(3,this)">3</button>
            <button class="limit-btn" onclick="setLimit(10,this)">10</button>
            <input type="text" id="custom-limit" placeholder="Custom…"
                   style="width:80px;padding:0.45rem 0.7rem;font-size:0.85rem"
                   oninput="setLimit(parseInt(this.value)||5,null)">
          </div>
        </div>

        <button class="btn-primary" id="btn-fetch" onclick="fetchAndAnalyze()">
          Fetch &amp; Analyze
        </button>
      </div>

      <!-- RESULTS -->
      <div id="results-section" class="results-section">

        <div class="form-section">
          <h2>📬 Emails fetched</h2>
          <div id="emails-list"></div>
        </div>

        <div class="form-section">
          <h2>🤖 AI Analysis</h2>
          <div class="ai-grid" id="ai-grid"></div>
          <div class="form-group">
            <label>Summary</label>
            <div id="ai-summary" style="font-size:0.88rem;line-height:1.7;color:var(--text)"></div>
          </div>
          <hr class="divider">
          <div class="form-group">
            <label>Action needed</label>
            <div id="ai-action" style="font-size:0.88rem;line-height:1.7;color:var(--text)"></div>
          </div>
        </div>

        <div class="form-section">
          <h2>✍️ Draft email</h2>
          <div class="form-group draft-area">
            <textarea id="draft-email" rows="7"></textarea>
            <div class="draft-actions">
              <div class="form-group" style="flex:1.5">
                <label>Subject line</label>
                <input type="text" id="draft-subject" placeholder="Re: …">
              </div>
              <button class="btn-outline" onclick="saveDraft()">Save to Gmail Drafts</button>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2>📅 Follow-up reminder</h2>
          <div class="reminder-row">
            <div class="form-group">
              <label>Suggested follow-up date</label>
              <input type="date" id="reminder-date">
            </div>
            <button class="btn-outline" onclick="createReminder()">📅 Add to Google Calendar</button>
          </div>
        </div>

        <div style="display:flex;gap:1rem;padding:0.25rem 0 1rem">
          <button class="btn-primary" onclick="saveLeadAndContinue()">
            ✅ Save &amp; analyze another contact
          </button>
          <button class="btn-outline" onclick="saveLeadOnly()">Save to queue only</button>
        </div>

      </div><!-- /results -->
    </div><!-- /analysis-form -->

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  mode: 'inbound',
  limit: 5,
  leads: [],          // all saved leads
  current: null,      // current analysis result
  lookupTimer: null,
};

// ── Utils ─────────────────────────────────────────────────────────────────────
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

function setLoading(btnId, loading, text='') {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  if (loading) {
    btn.dataset.orig = btn.innerHTML;
    btn.innerHTML = `<span class="spinner"></span> ${text}`;
    btn.disabled = true;
  } else {
    btn.innerHTML = btn.dataset.orig;
    btn.disabled = false;
  }
}

function scoreCls(s) { return s >= 7 ? 'high' : s >= 4 ? 'mid' : 'low'; }

// ── Mode & limit ──────────────────────────────────────────────────────────────
function setMode(m) {
  state.mode = m;
  document.getElementById('mode-inbound').classList.toggle('active', m==='inbound');
  document.getElementById('mode-outbound').classList.toggle('active', m==='outbound');
}

function setLimit(n, btn) {
  state.limit = n;
  document.querySelectorAll('.limit-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ── Contact lookup ────────────────────────────────────────────────────────────
function debounceLookup() {
  clearTimeout(state.lookupTimer);
  state.lookupTimer = setTimeout(lookupContact, 600);
}

async function lookupContact() {
  const email = document.getElementById('input-email').value.trim();
  const display = document.getElementById('contact-name-display');
  if (!email || !email.includes('@')) { display.style.display='none'; return; }
  try {
    const res = await fetch('/api/lookup-contact', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email})
    });
    const data = await res.json();
    if (data.lead_name) {
      display.style.display='block';
      display.innerHTML = `<span class="contact-found">✓ Found in contacts: <strong>${data.lead_name}</strong></span>`;
      state.resolvedName = data.lead_name;
    } else {
      display.style.display='none';
      state.resolvedName = '';
    }
  } catch(e) { display.style.display='none'; }
}

// ── Fetch & analyze ───────────────────────────────────────────────────────────
async function fetchAndAnalyze() {
  const emailVal = document.getElementById('input-email').value.trim();
  if (!emailVal) { showToast('Please enter a contact email.', 'error'); return; }

  setLoading('btn-fetch', true, 'Fetching emails…');
  document.getElementById('results-section').classList.remove('show');

  try {
    // 1. Fetch emails
    const fetchRes = await fetch('/api/fetch-emails', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: emailVal, mode: state.mode, max_results: state.limit})
    });
    const fetchData = await fetchRes.json();
    if (fetchData.error) { showToast(fetchData.error, 'error'); setLoading('btn-fetch',false); return; }

    // Render emails
    const emailsHtml = fetchData.emails.map(e => `
      <div class="email-item">
        <div class="email-subj">${e.subject}</div>
        <div class="email-meta">${e.from} &nbsp;·&nbsp; ${e.date}</div>
        <div style="font-size:0.82rem;color:var(--muted);margin-top:0.3rem">${e.snippet}</div>
      </div>`).join('');
    document.getElementById('emails-list').innerHTML = emailsHtml;

    // 2. Analyze
    const btn = document.getElementById('btn-fetch');
    btn.innerHTML = `<span class="spinner"></span> Analyzing with Gemini…`;

    const leadName = state.resolvedName || emailVal.split('@')[0];
    const analyzeRes = await fetch('/api/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        email_content: fetchData.email_content,
        mode: state.mode, lead_name: leadName, lead_email: emailVal
      })
    });
    const analyzeData = await analyzeRes.json();
    if (analyzeData.error) { showToast(analyzeData.error, 'error'); setLoading('btn-fetch',false); return; }

    // Render results
    const sc = analyzeData.lead_score;
    document.getElementById('ai-grid').innerHTML = `
      <div class="ai-card">
        <div class="ai-card-label">Lead score</div>
        <div class="score-ring ${scoreCls(sc)}">${sc}<span style="font-size:1rem;font-weight:400">/10</span></div>
      </div>
      <div class="ai-card">
        <div class="ai-card-label">Sentiment</div>
        <div class="ai-card-value">${analyzeData.sentiment || '—'}</div>
      </div>
      <div class="ai-card">
        <div class="ai-card-label">Follow-up date</div>
        <div class="ai-card-value">${analyzeData.follow_up_date}</div>
      </div>`;

    document.getElementById('ai-summary').textContent = analyzeData.summary;
    document.getElementById('ai-action').textContent  = analyzeData.action;
    document.getElementById('draft-email').value = analyzeData.draft_email;
    document.getElementById('reminder-date').value = analyzeData.follow_up_date;

    // Store current
    state.current = {
      lead_name:      leadName,
      lead_email:     emailVal,
      mode:           state.mode,
      lead_score:     analyzeData.lead_score,
      summary:        analyzeData.summary,
      sentiment:      analyzeData.sentiment,
      action:         analyzeData.action,
      follow_up_date: analyzeData.follow_up_date,
      draft_email:    analyzeData.draft_email,
    };

    document.getElementById('results-section').classList.add('show');
    setLoading('btn-fetch', false);

  } catch(e) {
    showToast('Unexpected error: ' + e.message, 'error');
    setLoading('btn-fetch', false);
  }
}

// ── Save draft to Gmail ───────────────────────────────────────────────────────
async function saveDraft() {
  const to      = document.getElementById('input-email').value.trim();
  const subject = document.getElementById('draft-subject').value.trim() || 'Follow-up';
  const body    = document.getElementById('draft-email').value.trim();
  if (!body) { showToast('Draft is empty.', 'error'); return; }
  try {
    const res = await fetch('/api/save-draft', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({to, subject, body})
    });
    const data = await res.json();
    if (data.success) showToast('✓ Draft saved to Gmail!');
    else showToast(data.error, 'error');
  } catch(e) { showToast('Failed: ' + e.message, 'error'); }
}

// ── Calendar reminder ─────────────────────────────────────────────────────────
async function createReminder() {
  const date = document.getElementById('reminder-date').value;
  if (!date) { showToast('Please select a date.', 'error'); return; }
  const c = state.current;
  try {
    const res = await fetch('/api/create-reminder', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        lead_name: c?.lead_name || '', lead_email: c?.lead_email || '',
        date, mode: state.mode
      })
    });
    const data = await res.json();
    if (data.success) {
      showToast('✓ Calendar reminder created!');
      if (data.link) window.open(data.link, '_blank');
    } else showToast(data.error, 'error');
  } catch(e) { showToast('Failed: ' + e.message, 'error'); }
}

// ── Lead queue management ─────────────────────────────────────────────────────
function saveLeadAndContinue() {
  if (state.current) {
    state.current.draft_email = document.getElementById('draft-email').value;
    state.leads.push({...state.current});
    renderLeads();
    showToast('✓ Lead saved to queue!');
  }
  showAddForm();
  document.getElementById('input-email').value = '';
  document.getElementById('contact-name-display').style.display = 'none';
  document.getElementById('results-section').classList.remove('show');
  state.current = null;
  state.resolvedName = '';
}

function saveLeadOnly() {
  if (state.current) {
    state.current.draft_email = document.getElementById('draft-email').value;
    state.leads.push({...state.current});
    renderLeads();
    showToast('✓ Lead added to queue.');
  }
}

function deleteLead(idx) {
  state.leads.splice(idx, 1);
  renderLeads();
}

function renderLeads() {
  const list = document.getElementById('lead-list');
  document.getElementById('lead-count').textContent = state.leads.length;
  document.getElementById('btn-create-sheet').disabled = state.leads.length === 0;

  if (state.leads.length === 0) {
    list.innerHTML = '<p style="font-size:0.8rem;color:var(--muted);text-align:center;padding:1rem 0">No leads yet</p>';
    return;
  }

  list.innerHTML = state.leads.map((l, i) => `
    <div class="lead-card">
      <button class="delete-lead" onclick="deleteLead(${i})">✕</button>
      <div class="lead-card-name">${l.lead_name}</div>
      <div class="lead-card-email">${l.lead_email}</div>
      <div class="lead-card-meta">
        <span class="score-badge ${scoreCls(l.lead_score)}">Score: ${l.lead_score}/10</span>
        <span class="mode-badge">${l.mode}</span>
      </div>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:0.4rem">Follow-up: ${l.follow_up_date}</div>
    </div>`).join('');
}

// ── Create Google Sheet ───────────────────────────────────────────────────────
async function createSheet() {
  if (state.leads.length === 0) { showToast('Add at least one lead first.', 'error'); return; }
  setLoading('btn-create-sheet', true, 'Creating sheet…');
  try {
    const res = await fetch('/api/create-sheet', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({leads: state.leads})
    });
    const data = await res.json();
    if (data.success) {
      showToast('✓ Google Sheet created!');
      const row = document.getElementById('sheet-link-row');
      row.style.display = 'block';
      row.innerHTML = `<a href="${data.link}" target="_blank">📊 Open Sheet →</a>`;
    } else showToast(data.error, 'error');
  } catch(e) { showToast('Failed: ' + e.message, 'error'); }
  setLoading('btn-create-sheet', false);
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showAddForm() {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('analysis-form').style.display = 'block';
  document.getElementById('results-section').classList.remove('show');
}

// Init
renderLeads();
</script>
</body>
</html>
